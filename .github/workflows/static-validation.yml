name: Static Validation

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run static validation
        run: scripts/static-validation.sh

      - name: Build release archives
        run: |
          scripts/package-release.sh
          CODEX_SENTINEL_FORCE_NO_RSYNC=1 scripts/package-release.sh Codex-Sentinel-fallback

      - name: Verify release archives
        run: |
          node scripts/verify-release-archive.mjs dist/Codex-Sentinel.zip
          node scripts/verify-release-archive.mjs dist/Codex-Sentinel-fallback.zip

      - name: Check archive hygiene
        run: |
          if unzip -l dist/*.zip | grep -E '__MACOSX|(^|/)\._'; then
            echo "AppleDouble artifacts detected in release archive" >&2
            exit 1
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: codex-sentinel-release-archive
          path: dist/*.zip
